name: Sounding

options:
  minimumXcodeGenVersion: 2.40.0
  deploymentTarget:
    macOS: "14.0"

packages:
  SoundingPackage:
    path: .
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: 2.7.0

targets:
  Sounding:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: App
    dependencies:
      - package: SoundingPackage
        product: SoundingKit
      - package: Sparkle
        product: Sparkle
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.sounding.Sounding
        PRODUCT_NAME: Sounding
        ACOUSTID_CLIENT_KEY: FYFIbD93Vn
        SWIFT_VERSION: "5.9"
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: App/Info.plist
        CODE_SIGNING_ALLOWED: NO
        CODE_SIGNING_REQUIRED: NO
        ENABLE_HARDENED_RUNTIME: YES
